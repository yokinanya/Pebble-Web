services:
  pebble-web:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - pebble-data:/data
    environment:
      - PEBBLE_PASSWORD=changeme
      - PEBBLE_JWT_SECRET=change-this-to-a-random-string
      - PEBBLE_DATA_DIR=/data
      - PEBBLE_PORT=8080
      - PEBBLE_SYNC_INTERVAL=300
    restart: unless-stopped

volumes:
  pebble-data:
